// ============ Storage API (Supabase avec fallback localStorage) ============
const storage = {
  _online: false,
  _checkOnline: async () => {
    if (!supabaseClient) return false;
    try {
      const { error } = await supabaseClient.from('projects').select('id').limit(1);
      storage._online = !error;
      return storage._online;
    } catch (e) {
      storage._online = false;
      return false;
    }
  },
  set: async (key, value) => {
    // Toujours backup local
    localStorage.setItem(key, value);
    if (!supabaseClient || !storage._online) return { key, value };
    try {
      if (key.startsWith('project:')) {
        const id = key.replace('project:', '');
        const data = JSON.parse(value);
        await supabaseClient.from('projects').upsert({ id, name: data.name, data, updated_at: new Date().toISOString() });
      } else if (key.startsWith('settings:')) {
        const id = key.replace('settings:', '');
        await supabaseClient.from('settings').upsert({ id, data: JSON.parse(value), updated_at: new Date().toISOString() });
      }
    } catch (e) { console.warn('Supabase set failed, using localStorage fallback', e); }
    return { key, value };
  },
  get: async (key) => {
    if (supabaseClient && storage._online) {
      try {
        if (key.startsWith('project:')) {
          const id = key.replace('project:', '');
          const { data } = await supabaseClient.from('projects').select('data').eq('id', id).single();
          if (data) { localStorage.setItem(key, JSON.stringify(data.data)); return { key, value: JSON.stringify(data.data) }; }
        } else if (key.startsWith('settings:')) {
          const id = key.replace('settings:', '');
          const { data } = await supabaseClient.from('settings').select('data').eq('id', id).single();
          if (data) { localStorage.setItem(key, JSON.stringify(data.data)); return { key, value: JSON.stringify(data.data) }; }
        }
      } catch (e) {}
    }
    // Fallback localStorage
    const value = localStorage.getItem(key);
    if (value === null) return null;
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    if (supabaseClient && storage._online) {
      try {
        if (key.startsWith('project:')) {
          const id = key.replace('project:', '');
          await supabaseClient.from('projects').delete().eq('id', id);
        }
      } catch (e) {}
    }
    return { key, deleted: true };
  },
  list: async (prefix = '') => {
    if (supabaseClient && storage._online && prefix.startsWith('project:')) {
      try {
        const { data } = await supabaseClient.from('projects').select('id, data');
        if (data && data.length > 0) {
          // Sync local
          data.forEach(row => localStorage.setItem(`project:${row.id}`, JSON.stringify(row.data)));
          return { keys: data.map(row => `project:${row.id}`), prefix };
        }
      } catch (e) {}
    }
    // Fallback localStorage
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix };
  }
};

    setActiveProjectId(p.id);
    saveProject(p);
  };

  const saveProject = async (project) => {
    try { await storage.set(`project:${project.id}`, JSON.stringify(project)); } catch (e) {}
  };

  const activeProject = projects.find(p => p.id === activeProjectId);

  const triggerWebhook = async (event, data) => {
    if (!settings.webhookUrl || !settings.webhookEvents[event]) return;
    try {
      await fetch(settings.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event, timestamp: new Date().toISOString(), project: activeProject?.name, data }),
        mode: 'no-cors'
      });
    } catch (e) {}
  };

  const updateActiveProject = (updater) => {
    setProjects(prev => prev.map(p => {
      if (p.id === activeProjectId) {
        const np = updater(p);
        saveProject(np);
        return np;
      }
      return p;
    }));
  };

  const addProject = () => {
    if (!newProjectName.trim()) return;
    const p = { id: `proj_${Date.now()}`, name: newProjectName.trim(), createdAt: new Date().toISOString(), tasks: [], team: [], parentId: newProjectParent, archived: false, activity: [] };
    setProjects(prev => [...prev, p]);
    setActiveProjectId(p.id);
    saveProject(p);
    setNewProjectName('');
    setNewProjectParent(null);
    setShowNewProject(false);
    setShowProjectDropdown(false);
  };

  const createFromTemplate = (template) => {
    const now = Date.now();
    const p = {
      id: `proj_${now}`,
      name: template.name,
      createdAt: new Date().toISOString(),
      tasks: template.tasks.map((t, idx) => ({
        id: `task_${now}_${idx}`,
        ...t,
        description: t.description || '',
        tags: t.tags || [],
        subtasks: [],
        assignee: '',
        recurrence: t.recurrence || 'none',
        dueDate: '',
        startDate: '',
        estimatedHours: '',
        createdAt: new Date().toISOString()
      })),
      team: [], parentId: null, archived: false,
      activity: [{ id: `act_${now}`, action: 'Projet créé', detail: `Depuis le template "${template.name}"`, timestamp: new Date().toISOString() }]
    };
    setProjects(prev => [...prev, p]);
    setActiveProjectId(p.id);
    saveProject(p);
    setShowTemplates(false);
    setShowProjectDropdown(false);
  };

  const deleteProject = async (projectId) => {
    const nonArchivedCount = projects.filter(p => !p.archived).length;
    if (nonArchivedCount <= 1 && !projects.find(p => p.id === projectId)?.archived) {
      alert('Tu dois garder au moins un projet actif.');
      return;
    }
    const subProjects = projects.filter(p => p.parentId === projectId);
    const msg = subProjects.length > 0 ? `Supprimer ce projet et ses ${subProjects.length} sous-projet(s) ?` : 'Supprimer ce projet et toutes ses tâches ?';
    if (!confirm(msg)) return;
    const idsToDelete = [projectId, ...subProjects.map(p => p.id)];
    for (const id of idsToDelete) { try { await storage.delete(`project:${id}`); } catch (e) {} }
    setProjects(prev => {
      const filtered = prev.filter(p => !idsToDelete.includes(p.id));
      if (idsToDelete.includes(activeProjectId) && filtered.length > 0) {
        const next = filtered.find(p => !p.archived) || filtered[0];
        setActiveProjectId(next.id);
      }
      return filtered;
    });
  };

  const toggleArchiveProject = (projectId) => {
    setProjects(prev => prev.map(p => {
      if (p.id === projectId) { const np = { ...p, archived: !p.archived }; saveProject(np); return np; }
      return p;
    }));
  };

  const addTeamMember = () => {
    if (!newMemberName.trim()) return;
    updateActiveProject(p => ({ ...p, team: [...(p.team || []), newMemberName.trim()] }));
    setNewMemberName('');
  };

  const removeTeamMember = (name) => {
    updateActiveProject(p => ({ ...p, team: (p.team || []).filter(m => m !== name), tasks: p.tasks.map(t => t.assignee === name ? { ...t, assignee: '' } : t) }));
  };

  const computeNextDate = (dateStr, recurrence) => {
    if (!dateStr || recurrence === 'none') return null;
    const d = new Date(dateStr);
    switch (recurrence) {
      case 'daily': d.setDate(d.getDate() + 1); break;
      case 'weekly': d.setDate(d.getDate() + 7); break;
      case 'biweekly': d.setDate(d.getDate() + 14); break;
      case 'monthly': d.setMonth(d.getMonth() + 1); break;
      case 'quarterly': d.setMonth(d.getMonth() + 3); break;
      case 'yearly': d.setFullYear(d.getFullYear() + 1); break;
    }
    return d.toISOString().split('T')[0];
  };

  const addTask = (columnId) => {
    if (!newTask.title.trim()) return;
    const task = { id: `task_${Date.now()}`, ...newTask, title: newTask.title.trim(), status: columnId, createdAt: new Date().toISOString() };
    updateActiveProject(p => ({
      ...p, tasks: [...p.tasks, task],
      activity: [{ id: `act_${Date.now()}`, action: 'Tâche créée', detail: task.title, timestamp: new Date().toISOString() }, ...(p.activity || [])].slice(0, 100)
    }));
    triggerWebhook('taskCreated', { task });
    setNewTask(defaultNewTask);
    setShowNewTask(null);
  };

  const deleteTask = (taskId) => {
    const task = activeProject?.tasks.find(t => t.id === taskId);
    updateActiveProject(p => ({
      ...p, tasks: p.tasks.filter(t => t.id !== taskId),
      activity: task ? [{ id: `act_${Date.now()}`, action: 'Tâche supprimée', detail: task.title, timestamp: new Date().toISOString() }, ...(p.activity || [])].slice(0, 100) : p.activity
    }));
  };

  const duplicateTask = (task) => {
    const copy = { ...task, id: `task_${Date.now()}`, title: `${task.title} (copie)`, createdAt: new Date().toISOString(), subtasks: (task.subtasks || []).map(s => ({ ...s, id: `st_${Date.now()}_${Math.random()}`, done: false })) };
    updateActiveProject(p => ({ ...p, tasks: [...p.tasks, copy] }));
  };

  const updateTask = (taskId, updates) => {
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, ...updates } : t) }));
  };

  const moveTask = (taskId, newStatus) => {
    const task = activeProject?.tasks.find(t => t.id === taskId);
    if (!task) return;
    if (newStatus === 'done' && task.status !== 'done' && task.recurrence && task.recurrence !== 'none' && task.dueDate) {
      const nextDate = computeNextDate(task.dueDate, task.recurrence);
      const nextStart = task.startDate ? computeNextDate(task.startDate, task.recurrence) : '';
      const nextTask = { ...task, id: `task_${Date.now()}`, status: 'todo', dueDate: nextDate, startDate: nextStart, subtasks: (task.subtasks || []).map(s => ({ ...s, id: `st_${Date.now()}_${Math.random()}`, done: false })), createdAt: new Date().toISOString() };
      updateActiveProject(p => ({
        ...p, tasks: [...p.tasks.map(t => t.id === taskId ? { ...t, status: 'done' } : t), nextTask],
        activity: [{ id: `act_${Date.now()}`, action: 'Tâche terminée', detail: `${task.title} → occurrence suivante créée`, timestamp: new Date().toISOString() }, ...(p.activity || [])].slice(0, 100)
      }));
      triggerWebhook('taskCompleted', { task });
    } else {
      const statusLabel = columns.find(c => c.id === newStatus)?.title || newStatus;
      updateActiveProject(p => ({
        ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, status: newStatus } : t),
        activity: [{ id: `act_${Date.now()}`, action: newStatus === 'done' ? 'Tâche terminée' : 'Statut modifié', detail: `${task.title} → ${statusLabel}`, timestamp: new Date().toISOString() }, ...(p.activity || [])].slice(0, 100)
      }));
      if (newStatus === 'done') triggerWebhook('taskCompleted', { task });
    }
  };

  const addSubtask = (taskId, title) => {
    if (!title.trim()) return;
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, subtasks: [...(t.subtasks || []), { id: `st_${Date.now()}`, title: title.trim(), done: false }] } : t) }));
  };

  const toggleSubtask = (taskId, subtaskId) => {
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, subtasks: t.subtasks.map(s => s.id === subtaskId ? { ...s, done: !s.done } : s) } : t) }));
  };

  const deleteSubtask = (taskId, subtaskId) => {
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, subtasks: t.subtasks.filter(s => s.id !== subtaskId) } : t) }));
  };

  const addTag = (taskId, tag) => {
    const clean = tag.trim().toLowerCase();
    if (!clean) return;
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, tags: [...new Set([...(t.tags || []), clean])] } : t) }));
  };

  const removeTag = (taskId, tag) => {
    updateActiveProject(p => ({ ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, tags: (t.tags || []).filter(x => x !== tag) } : t) }));
  };

  const handleDragStart = (e, task) => { setDraggedTask(task); e.dataTransfer.effectAllowed = 'move'; };
  const handleDragOver = (e, columnId) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverColumn(columnId); };
  const handleDragLeave = () => setDragOverColumn(null);
  const handleDrop = (e, columnId) => {
    e.preventDefault();
    if (draggedTask && draggedTask.status !== columnId) moveTask(draggedTask.id, columnId);
    setDraggedTask(null);
    setDragOverColumn(null);
  };

  const getFilteredTasks = () => {
    if (!activeProject) return [];
    return activeProject.tasks.filter(t => {
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        const ok = t.title.toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q) || (t.tags || []).some(tag => tag.includes(q)) || (t.assignee || '').toLowerCase().includes(q);
        if (!ok) return false;
      }
      if (filterPriority !== 'all' && t.priority !== filterPriority) return false;
      if (filterTag !== 'all' && !(t.tags || []).includes(filterTag)) return false;
      if (filterAssignee !== 'all') {
        if (filterAssignee === 'unassigned' && t.assignee) return false;
        if (filterAssignee !== 'unassigned' && t.assignee !== filterAssignee) return false;
      }
      return true;
    });
  };

  const getTasksByStatus = (status) => getFilteredTasks().filter(t => t.status === status);

  const getAllTags = () => {
    if (!activeProject) return [];
    const tags = new Set();
    activeProject.tasks.forEach(t => (t.tags || []).forEach(tag => tags.add(tag)));
    return [...tags].sort();
  };

  const isOverdue = (dueDate) => {
    if (!dueDate) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return new Date(dueDate) < today;
  };

  const formatDate = (dateStr) => {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
  };

  const getStats = () => {
    if (!activeProject) return { total: 0, done: 0, progress: 0, overdue: 0, dueToday: 0 };
    const total = activeProject.tasks.length;
    const done = activeProject.tasks.filter(t => t.status === 'done').length;
    const overdue = activeProject.tasks.filter(t => isOverdue(t.dueDate) && t.status !== 'done').length;
    const today = new Date().toISOString().split('T')[0];
    const dueToday = activeProject.tasks.filter(t => t.dueDate === today && t.status !== 'done').length;
    const progress = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, progress, overdue, dueToday };
  };

  const notifications = useMemo(() => {
    if (!activeProject || !settings.notificationsEnabled) return [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().split('T')[0];
    const in3days = new Date(today);
    in3days.setDate(in3days.getDate() + 3);
    const items = [];
    activeProject.tasks.forEach(t => {
      if (t.status === 'done' || !t.dueDate) return;
      const due = new Date(t.dueDate);
      if (due < today) {
        const daysLate = Math.floor((today - due) / (1000 * 60 * 60 * 24));
        items.push({ type: 'overdue', task: t, severity: 3, message: `En retard de ${daysLate} jour${daysLate > 1 ? 's' : ''}` });
      } else if (t.dueDate === todayStr) items.push({ type: 'today', task: t, severity: 2, message: "À faire aujourd'hui" });
      else if (due <= in3days) { const daysUntil = Math.floor((due - today) / (1000 * 60 * 60 * 24)); items.push({ type: 'soon', task: t, severity: 1, message: `Dans ${daysUntil} jour${daysUntil > 1 ? 's' : ''}` }); }
      if (t.priority === 'urgent' && t.status !== 'done') items.push({ type: 'urgent', task: t, severity: 2, message: 'Priorité urgente' });
    });
    return items.sort((a, b) => b.severity - a.severity);
  }, [activeProject, settings.notificationsEnabled]);

  const requestNotificationPermission = async () => {
    if (typeof Notification === 'undefined') { alert('Ton navigateur ne supporte pas les notifications.'); return; }
    const result = await Notification.requestPermission();
    if (result === 'granted') new Notification('Notifications activées ✅', { body: 'Tu recevras une alerte pour chaque tâche en retard.' });
  };

  const escapeHtml = (str) => {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  };

  const exportToPDF = () => {
    if (!activeProject) return;
    const stats = getStats();
    const today = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(activeProject.name)}</title><style>
      @page { size: A4; margin: 2cm; }
      body { font-family: -apple-system, sans-serif; color: #1e293b; margin: 0; line-height: 1.5; }
      .header { border-bottom: 3px solid #3b82f6; padding-bottom: 16px; margin-bottom: 24px; }
      h1 { margin: 0 0 8px 0; font-size: 28px; color: #0f172a; }
      .meta { color: #64748b; font-size: 13px; }
      .stats { display: flex; gap: 24px; margin: 24px 0; padding: 16px; background: #f8fafc; border-radius: 8px; }
      .stat { flex: 1; }
      .stat-value { font-size: 24px; font-weight: 600; color: #0f172a; }
      .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; margin-top: 4px; }
      h2 { font-size: 18px; margin: 24px 0 12px 0; padding: 8px 12px; border-radius: 6px; }
      h2.todo { background: #f1f5f9; color: #475569; }
      h2.doing { background: #dbeafe; color: #1e40af; }
      h2.review { background: #fef3c7; color: #92400e; }
      h2.done { background: #dcfce7; color: #166534; }
      .task { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; page-break-inside: avoid; }
      .task-title { font-weight: 600; font-size: 14px; }
      .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; display: inline-block; margin: 2px; }
      .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; text-align: center; }
    </style></head><body>
      <div class="header"><h1>${escapeHtml(activeProject.name)}</h1><div class="meta">Rapport généré le ${today}</div></div>
      <div class="stats">
        <div class="stat"><div class="stat-value">${stats.total}</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-value">${stats.done}</div><div class="stat-label">Terminées</div></div>
        <div class="stat"><div class="stat-value">${stats.overdue}</div><div class="stat-label">En retard</div></div>
        <div class="stat"><div class="stat-value">${stats.progress}%</div><div class="stat-label">Progression</div></div>
      </div>
      ${columns.map(col => {
        const tasks = activeProject.tasks.filter(t => t.status === col.id);
        if (tasks.length === 0) return '';
        return `<h2 class="${col.id}">${col.title} (${tasks.length})</h2>
        ${tasks.map(t => `<div class="task">
          <div class="task-title">${escapeHtml(t.title)}</div>
          ${t.description ? `<p>${escapeHtml(t.description)}</p>` : ''}
          <div>
            <span class="badge">${priorities[t.priority].label}</span>
            ${t.assignee ? `<span class="badge">${escapeHtml(t.assignee)}</span>` : ''}
            ${t.dueDate ? `<span class="badge">${formatDate(t.dueDate)}</span>` : ''}
            ${(t.tags || []).map(tag => `<span class="badge">#${escapeHtml(tag)}</span>`).join('')}
          </div>
        </div>`).join('')}`;
      }).join('')}
      <div class="footer">Généré avec Project Manager</div>
    </body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if (w) w.onload = () => setTimeout(() => w.print(), 250);
    setShowExportMenu(false);
  };

  const exportToCSV = () => {
    if (!activeProject) return;
    const headers = ['Titre', 'Description', 'Statut', 'Priorité', 'Date début', 'Date échéance', 'Heures estimées', 'Assigné à', 'Tags', 'Récurrence', 'Sous-tâches (total)', 'Sous-tâches (terminées)', 'En retard', 'Date création'];
    const statusMap = { todo: 'À faire', doing: 'En cours', review: 'À valider', done: 'Terminé' };
    const csvCell = (val) => {
      const s = String(val ?? '');
      if (s.includes('"') || s.includes(',') || s.includes(';') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
      return s;
    };
    const rows = activeProject.tasks.map(t => [t.title, (t.description || '').replace(/\n/g, ' '), statusMap[t.status] || t.status, priorities[t.priority]?.label || t.priority, t.startDate || '', t.dueDate || '', t.estimatedHours || '', t.assignee || '', (t.tags || []).join(', '), recurrenceOptions[t.recurrence] || 'Aucune', (t.subtasks || []).length, (t.subtasks || []).filter(s => s.done).length, isOverdue(t.dueDate) && t.status !== 'done' ? 'Oui' : 'Non', t.createdAt ? new Date(t.createdAt).toLocaleDateString('fr-FR') : '']);
    const csv = '\uFEFF' + [headers, ...rows].map(r => r.map(csvCell).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${activeProject.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    URL.revokeObjectURL(url);
    setShowExportMenu(false);
  };

  const exportJSON = () => {
    if (!activeProject) return;
    const blob = new Blob([JSON.stringify(activeProject, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${activeProject.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_backup.json`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    URL.revokeObjectURL(url);
    setShowExportMenu(false);
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const imported = { ...data, id: `proj_${Date.now()}`, name: `${data.name} (importé)`, archived: false };
        setProjects(prev => [...prev, imported]);
        setActiveProjectId(imported.id);
        saveProject(imported);
        setShowExportMenu(false);
      } catch (err) { alert('Fichier invalide'); }
    };
    reader.readAsText(file);
  };

  const getDaysInMonth = (date) => {
    const year = date.getFullYear(), month = date.getMonth();
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startDay = (new Date(year, month, 1).getDay() + 6) % 7;
    const days = [];
    const prevLastDay = new Date(year, month, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) days.push({ day: prevLastDay - i, currentMonth: false, date: new Date(year, month - 1, prevLastDay - i) });
    for (let i = 1; i <= daysInMonth; i++) days.push({ day: i, currentMonth: true, date: new Date(year, month, i) });
    const remaining = (7 - (days.length % 7)) % 7;
    for (let i = 1; i <= remaining; i++) days.push({ day: i, currentMonth: false, date: new Date(year, month + 1, i) });
    return days;
  };

  const getTasksForDate = (date) => {
    if (!activeProject) return [];
    const dateStr = date.toISOString().split('T')[0];
    return getFilteredTasks().filter(t => t.dueDate === dateStr);
  };

  const isSameDay = (d1, d2) => d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();

  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowCommandPalette(true); return; }
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable) return;
      if (e.key === '/') { e.preventDefault(); searchInputRef.current?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); setShowNewTask('todo'); }
      else if (e.key === '1') setViewMode('focus');
      else if (e.key === '2') setViewMode('kanban');
      else if (e.key === '3') setViewMode('list');
      else if (e.key === '4') setViewMode('calendar');
      else if (e.key === '5') setViewMode('gantt');
      else if (e.key === '6') setViewMode('dashboard');
      else if (e.key === '?') { e.preventDefault(); setShowShortcuts(true); }
      else if (e.key === 'Escape') {
        setShowCommandPalette(false); setShowShortcuts(false); setShowActivity(false);
        setShowSettings(false); setShowNotifications(false); setShowExportMenu(false); setShowProjectDropdown(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  if (loading) return <div className="flex items-center justify-center h-screen text-slate-500">Chargement...</div>;

  const stats = getStats();
  const allTags = getAllTags();
  const filteredTasks = getFilteredTasks();
  const nonArchivedProjects = projects.filter(p => !p.archived);
  const archivedProjects = projects.filter(p => p.archived);
  const rootProjects = nonArchivedProjects.filter(p => !p.parentId);
  const getSubProjects = (parentId) => nonArchivedProjects.filter(p => p.parentId === parentId);

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-900 p-4 md:p-6 transition-colors">
      <div className="max-w-7xl mx-auto">
        <div className="mb-4">

function ActivityModal({ activity, onClose }) {
  const formatTime = (ts) => {
    const d = new Date(ts), now = new Date();
    const mins = Math.floor((now - d) / 60000);
    if (mins < 1) return "à l'instant";
    if (mins < 60) return `il y a ${mins} min`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `il y a ${hours}h`;
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  };
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col" onClick={(e) => e.stopPropagation()}>

        <div className="flex-1 overflow-y-auto p-6">
          {activity.length === 0 ? <p className="text-sm text-slate-400 text-center py-8">Aucune activité</p> : (
            <div className="space-y-3">
              {activity.map(a => (
                <div key={a.id} className="flex gap-3">
                  <div className="w-2 h-2 rounded-full bg-blue-400 mt-1.5 shrink-0" />
                  <div className="flex-1 min-w-0">
                    <div className="text-sm"><span className="font-medium">{a.action}</span> — <span className="text-slate-600">{a.detail}</span></div>
                    <div className="text-xs text-slate-400 mt-0.5">{formatTime(a.timestamp)}</div>

              ))}
            </div>
          )}

  );
}

function CommandPalette({ projects, onSelectProject, onViewChange, onNewTask, onNewProject, onClose }) {
  const [query, setQuery] = useState('');
  const [selectedIdx, setSelectedIdx] = useState(0);
  const commands = useMemo(() => {
    const all = [
      { id: 'new-task', label: 'Nouvelle tâche', icon: Plus, action: onNewTask, category: 'Action' },
      { id: 'new-project', label: 'Nouveau projet depuis template', icon: Sparkles, action: onNewProject, category: 'Action' },
      { id: 'view-focus', label: 'Vue : Focus', icon: Target, action: () => onViewChange('focus'), category: 'Vue' },
      { id: 'view-kanban', label: 'Vue : Kanban', icon: LayoutGrid, action: () => onViewChange('kanban'), category: 'Vue' },
      { id: 'view-list', label: 'Vue : Liste', icon: List, action: () => onViewChange('list'), category: 'Vue' },
      { id: 'view-calendar', label: 'Vue : Calendrier', icon: CalendarDays, action: () => onViewChange('calendar'), category: 'Vue' },
      { id: 'view-gantt', label: 'Vue : Gantt', icon: BarChart3, action: () => onViewChange('gantt'), category: 'Vue' },
      { id: 'view-dashboard', label: 'Vue : Dashboard', icon: TrendingUp, action: () => onViewChange('dashboard'), category: 'Vue' },
      ...projects.map(p => ({ id: `proj-${p.id}`, label: p.name, icon: Folder, action: () => onSelectProject(p.id), category: 'Projet' }))
    ];
    if (!query) return all;
    const q = query.toLowerCase();
    return all.filter(c => c.label.toLowerCase().includes(q));
  }, [query, projects]);
  useEffect(() => { setSelectedIdx(0); }, [query]);
  const handleKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, commands.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); commands[selectedIdx]?.action(); }
  };
  return (
    <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-4 pt-20" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-xl max-w-lg w-full overflow-hidden" onClick={(e) => e.stopPropagation()}>
        <div className="p-3 border-b border-slate-200 dark:border-slate-700">
          <div className="relative">
            <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} onKeyDown={handleKey} autoFocus placeholder="Commande..." className="w-full pl-9 pr-3 py-2 text-sm bg-transparent border-none focus:outline-none" />
          </div>
        </div>
        <div className="max-h-96 overflow-y-auto p-2">
          {commands.length === 0 ? <div className="text-center text-sm text-slate-400 py-8">Aucun résultat</div> : commands.map((c, idx) => {
            const IconC = c.icon;
            return <button key={c.id} onClick={c.action} onMouseEnter={() => setSelectedIdx(idx)} className={`w-full flex items-center gap-3 px-3 py-2 rounded text-left transition-colors ${idx === selectedIdx ? 'bg-blue-50 dark:bg-blue-900/30' : 'hover:bg-slate-50 dark:hover:bg-slate-900'}`}>
              <IconC size={14} className="text-slate-400 shrink-0" /><span className="text-sm flex-1">{c.label}</span><span className="text-[10px] text-slate-400">{c.category}</span>
            </button>;
          })}
        </div>
      </div>
    </div>
  );
}

function GanttView({ tasks, columns, priorities, formatDate }) {
  const tasksWithDates = tasks.filter(t => t.startDate && t.dueDate).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
  if (tasksWithDates.length === 0) {
    return <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-12 text-center">
      <BarChart3 size={48} className="mx-auto text-slate-300 mb-4" />
      <h3 className="text-lg font-medium mb-2">Diagramme de Gantt</h3>
      <p className="text-sm text-slate-500">Ajoute des dates de début et de fin à tes tâches pour les voir apparaître ici.</p>
    </div>;
  }
  const allDates = tasksWithDates.flatMap(t => [new Date(t.startDate), new Date(t.dueDate)]);
  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  minDate.setDate(minDate.getDate() - 2);
  maxDate.setDate(maxDate.getDate() + 2);
  const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
  const dayWidth = Math.max(30, Math.min(60, 800 / totalDays));
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const getDayOffset = (date) => Math.floor((new Date(date) - minDate) / (1000 * 60 * 60 * 24));
  const getDuration = (start, end) => Math.max(1, Math.ceil((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1);
  const months = [];
  let cursor = new Date(minDate);
  while (cursor <= maxDate) {
    months.push({ name: cursor.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }), offset: getDayOffset(cursor), daysInMonth: new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0).getDate() });
    cursor.setMonth(cursor.getMonth() + 1);
    cursor.setDate(1);
  }
  return (
    <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
      <div className="p-4 border-b border-slate-200 dark:border-slate-700">
        <h3 className="text-lg font-semibold flex items-center gap-2"><BarChart3 size={18} /> Gantt</h3>
      </div>
      <div className="overflow-x-auto">
        <div style={{ minWidth: `${300 + totalDays * dayWidth}px` }}>
          <div className="flex border-b border-slate-200 dark:border-slate-700">
            <div style={{ width: 300 }} className="shrink-0 p-3 text-xs font-medium text-slate-500 border-r border-slate-200 dark:border-slate-700">Tâche</div>
            <div className="relative flex-1" style={{ height: 40 }}>
              {months.map((m, idx) => <div key={idx} className="absolute top-0 h-full flex items-center justify-center text-xs font-medium text-slate-600 dark:text-slate-400 border-r border-slate-200 dark:border-slate-700 capitalize" style={{ left: m.offset * dayWidth, width: m.daysInMonth * dayWidth }}>{m.name}</div>)}
            </div>
          </div>
          {tasksWithDates.map((task) => {
            const startOffset = getDayOffset(task.startDate);
            const duration = getDuration(task.startDate, task.dueDate);
            const col = columns.find(c => c.id === task.status);
            const subtasksCount = (task.subtasks || []).length;
            const subtasksDone = (task.subtasks || []).filter(s => s.done).length;
            const taskProgress = task.status === 'done' ? 100 : subtasksCount > 0 ? (subtasksDone / subtasksCount) * 100 : task.status === 'doing' ? 50 : task.status === 'review' ? 75 : 0;
            return (
              <div key={task.id} className="flex border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-900/30">
                <div style={{ width: 300 }} className="shrink-0 p-3 border-r border-slate-200 dark:border-slate-700">
                  <div className="text-sm font-medium truncate">{task.title}</div>
                  <div className="flex items-center gap-1.5 mt-1">
                    <span className={`text-[10px] px-1.5 py-0.5 rounded ${priorities[task.priority].bg} ${priorities[task.priority].color}`}>{priorities[task.priority].label}</span>
                    <span className="text-[10px] text-slate-500">{duration}j</span>
                  </div>
                </div>
                <div className="relative flex-1" style={{ height: 56 }}>
                  {today >= minDate && today <= maxDate && <div className="absolute top-0 bottom-0 w-px bg-red-400" style={{ left: getDayOffset(today) * dayWidth }} />}
                  <div className="absolute top-1/2 -translate-y-1/2 rounded overflow-hidden shadow-sm" style={{ left: startOffset * dayWidth + 2, width: duration * dayWidth - 4, height: 28, backgroundColor: col.gantt + '40' }}>
                    <div className="h-full transition-all" style={{ width: `${taskProgress}%`, backgroundColor: col.gantt }} />
                    <div className="absolute inset-0 flex items-center px-2"><span className="text-[10px] font-medium truncate">{task.title}</span></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function FocusView({ tasks, columns, priorities, getAvatarColor, getInitials, formatDate, isOverdue, onMoveTask, getTagColor }) {
  const today = new Date().toISOString().split('T')[0];
  const todayTasks = tasks.filter(t => t.dueDate === today && t.status !== 'done');
  const overdueTasks = tasks.filter(t => isOverdue(t.dueDate) && t.status !== 'done');
  const urgentTasks = tasks.filter(t => t.priority === 'urgent' && t.status !== 'done' && t.dueDate !== today && !isOverdue(t.dueDate));
  const inProgressTasks = tasks.filter(t => t.status === 'doing' && t.dueDate !== today && !isOverdue(t.dueDate) && t.priority !== 'urgent');
  const totalFocus = todayTasks.length + overdueTasks.length + urgentTasks.length + inProgressTasks.length;

        <div className="divide-y divide-slate-200 dark:divide-slate-700">

                      {t.dueDate && <span className={`text-[10px] px-1.5 py-0.5 rounded flex items-center gap-1 ${isOverdue(t.dueDate) ? 'bg-red-100 text-red-600' : 'bg-slate-100 dark:bg-slate-700'}`}><Calendar size={10} />{formatDate(t.dueDate)}</span>}
                      {t.assignee && <span className="text-[10px] px-1 py-0.5 rounded bg-slate-100 dark:bg-slate-700 flex items-center gap-1"><span className={`w-3 h-3 rounded-full ${getAvatarColor(t.assignee)} text-white flex items-center justify-center text-[8px]`}>{getInitials(t.assignee)}</span>{t.assignee}</span>}
                      {(t.tags || []).map(tag => { const tc = getTagColor(tag); return <span key={tag} className={`text-[10px] px-1.5 py-0.5 rounded ${tc.bg} ${tc.text}`}>#{tag}</span>; })}
                    </div>

        <p className="text-sm opacity-90 capitalize">{todayDate}</p>
        <div className="mt-4 flex items-center gap-4 text-sm flex-wrap">
          <div><span className="text-2xl font-bold">{totalFocus}</span> <span className="opacity-75">à traiter</span></div>
          {overdueTasks.length > 0 && <div className="px-3 py-1 bg-white/20 rounded-full text-xs">⚠ {overdueTasks.length} en retard</div>}
          {urgentTasks.length > 0 && <div className="px-3 py-1 bg-white/20 rounded-full text-xs">⚡ {urgentTasks.length} urgent</div>}

function DashboardView({ activeProject, tasks, columns, priorities, getTagColor, getAvatarColor, getInitials, isOverdue }) {
  if (!activeProject) return null;
  const total = tasks.length;
  const byStatus = columns.map(c => ({ ...c, count: tasks.filter(t => t.status === c.id).length }));
  const byPriority = Object.entries(priorities).map(([k, v]) => ({ key: k, ...v, count: tasks.filter(t => t.priority === k).length }));
  const tagCounts = {};
  tasks.forEach(t => (t.tags || []).forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; }));
  const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const assigneeCounts = {};
  tasks.forEach(t => { const key = t.assignee || 'Non assigné'; assigneeCounts[key] = (assigneeCounts[key] || 0) + 1; });
  const assigneeList = Object.entries(assigneeCounts).sort((a, b) => b[1] - a[1]);
  const overdue = tasks.filter(t => isOverdue(t.dueDate) && t.status !== 'done').length;
  const totalHours = tasks.reduce((sum, t) => sum + (parseFloat(t.estimatedHours) || 0), 0);
  const doneHours = tasks.filter(t => t.status === 'done').reduce((sum, t) => sum + (parseFloat(t.estimatedHours) || 0), 0);
  const maxStatusCount = Math.max(...byStatus.map(s => s.count), 1);
  const maxPriorityCount = Math.max(...byPriority.map(p => p.count), 1);

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4"><div className="text-xs text-slate-500 uppercase">Total</div><div className="text-2xl font-semibold mt-1">{total}</div></div>
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4"><div className="text-xs text-slate-500 uppercase">Terminées</div><div className="text-2xl font-semibold text-green-600 mt-1">{byStatus.find(s => s.id === 'done').count}</div></div>
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4"><div className="text-xs text-slate-500 uppercase">En retard</div><div className={`text-2xl font-semibold mt-1 ${overdue > 0 ? 'text-red-600' : ''}`}>{overdue}</div></div>
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4"><div className="text-xs text-slate-500 uppercase">Heures</div><div className="text-2xl font-semibold mt-1">{doneHours}<span className="text-sm text-slate-400">/{totalHours}h</span></div></div>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
          <h3 className="text-sm font-semibold mb-4">Par statut</h3>
          <div className="space-y-3">
            {byStatus.map(s => (
              <div key={s.id}>
                <div className="flex justify-between text-xs mb-1"><span>{s.title}</span><span className="text-slate-500">{s.count}</span></div>
                <div className="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: `${(s.count / maxStatusCount) * 100}%`, backgroundColor: s.gantt }} /></div>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
          <h3 className="text-sm font-semibold mb-4">Par priorité</h3>
          <div className="space-y-3">
            {byPriority.map(p => (
              <div key={p.key}>
                <div className="flex justify-between text-xs mb-1"><span>{p.label}</span><span className="text-slate-500">{p.count}</span></div>
                <div className="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full ${p.key === 'urgent' ? 'bg-red-500' : p.key === 'high' ? 'bg-orange-500' : p.key === 'medium' ? 'bg-blue-500' : 'bg-slate-400'}`} style={{ width: `${(p.count / maxPriorityCount) * 100}%` }} /></div>
              </div>
            ))}
          </div>
        </div>
        {assigneeList.length > 0 && (
          <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
            <h3 className="text-sm font-semibold mb-4">Par personne</h3>
            <div className="space-y-2">
              {assigneeList.map(([name, count]) => (
                <div key={name} className="flex items-center gap-3">
                  {name === 'Non assigné' ? <div className="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-400 flex items-center justify-center text-xs">?</div> : <div className={`w-8 h-8 rounded-full ${getAvatarColor(name)} text-white flex items-center justify-center text-xs font-medium`}>{getInitials(name)}</div>}
                  <div className="flex-1">
                    <div className="flex justify-between text-xs mb-1"><span className="truncate">{name}</span><span className="text-slate-500">{count}</span></div>
                    <div className="h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{ width: `${(count / total) * 100}%` }} /></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {topTags.length > 0 && (
          <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
            <h3 className="text-sm font-semibold mb-4">Top tags</h3>
            <div className="flex flex-wrap gap-2">
              {topTags.map(([tag, count]) => { const tc = getTagColor(tag); return <span key={tag} className={`text-xs px-2.5 py-1.5 rounded-full ${tc.bg} ${tc.text} flex items-center gap-2`}>#{tag}<span className="bg-white/60 dark:bg-black/20 px-1.5 rounded-full text-[10px] font-semibold">{count}</span></span>; })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProjectManager />);
</script>
</body>
</html>
